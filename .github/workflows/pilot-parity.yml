name: Pilot Parity Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/pilot-parity.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Run pilot parity + smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt || true; fi

      - name: Run pilot parity test and smoke
        env:
          PYTHONPATH: .
          QDRANT_MODE: memory
          PILOT_CONNECTORS: ""
        run: |
          python -m pytest -q backend/tests/test_pilot_contract_parity.py -q
          python -m pytest -q backend/tests/test_run_ledger_service.py -q || true
