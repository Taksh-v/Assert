repos:
  - repo: local
    hooks:
      - id: scan-secrets
        name: scan-secrets
        entry: python3 scripts/scan_secrets.py
        language: system
        pass_filenames: false
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
